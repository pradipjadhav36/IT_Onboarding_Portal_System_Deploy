<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
		<meta name="viewport"
		      content="width=device-width, initial-scale=1.0">
			  <link rel="stylesheet" th:href="@{/css/fragments.css}">
<title>Update User</title>
<style>

/* =========================================
   GLOBAL CSS
========================================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f7fc;
    color:#333;
    overflow-x:hidden;
}

/* =========================================
   MAIN CONTENT
========================================= */

.main-content{
    width:100%;
    padding:30px 15px;
}

/* =========================================
   FORM CONTAINER
========================================= */

.container{
    width:100%;
    max-width:700px;

    margin:0 auto;

    background:#fff;

    padding:35px;

    border-radius:16px;

    box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

/* =========================================
   PAGE TITLE
========================================= */

.container h2{
    text-align:center;

    color:#1e3c72;

    margin-bottom:30px;

    font-size:32px;
}

/* =========================================
   SUCCESS MESSAGE
========================================= */

.success-msg{
    background:#d4edda;

    color:#155724;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    text-align:center;

    font-weight:bold;
}

/* =========================================
   ERROR MESSAGE
========================================= */

.error-msg{
    background:#f8d7da;

    color:#721c24;

    padding:12px;

    border-radius:8px;

    margin-bottom:20px;

    text-align:center;

    font-weight:bold;
}

/* =========================================
   FORM GROUP
========================================= */

.form-group{
    display:flex;
    flex-direction:column;

    margin-bottom:20px;
}

/* =========================================
   LABEL
========================================= */

label{
    margin-bottom:8px;

    font-size:15px;
    font-weight:600;

    color:#333;
}

/* =========================================
   INPUT + SELECT
========================================= */

input,
select{
    width:100%;

    padding:12px 14px;

    border:1px solid #ccc;

    border-radius:8px;

    font-size:15px;

    transition:0.3s;
}

/* =========================================
   INPUT FOCUS
========================================= */

input:focus,
select:focus{
    border-color:#1e3c72;

    outline:none;

    box-shadow:0 0 6px rgba(30,60,114,0.25);
}

/* =========================================
   BUTTON GROUP
========================================= */

.button-group{
    display:flex;

    justify-content:center;

    gap:15px;

    margin-top:25px;

    flex-wrap:wrap;
}

/* =========================================
   UPDATE BUTTON
========================================= */

.update-btn{
    background:#1e3c72;

    color:#fff;

    border:none;

    padding:12px 25px;

    border-radius:8px;

    font-size:15px;
    font-weight:bold;

    cursor:pointer;

    transition:0.3s;
}

.update-btn:hover{
    background:#16325c;
}

/* =========================================
   BACK BUTTON
========================================= */

.back-btn{
    display:inline-block;

    background:#dc3545;

    color:#fff;

    padding:12px 25px;

    border-radius:8px;

    text-decoration:none;

    font-size:15px;
    font-weight:bold;

    transition:0.3s;
}

.back-btn:hover{
    background:#b52a37;
}

/* =========================================
   TABLET RESPONSIVE
========================================= */

@media(max-width:768px){

    .main-content{
        padding:20px 12px;
    }

    .container{
        padding:25px;
    }

    .container h2{
        font-size:26px;
    }

    input,
    select{
        font-size:14px;
    }

    .update-btn,
    .back-btn{
        font-size:14px;

        padding:10px 20px;
    }
}

/* =========================================
   MOBILE RESPONSIVE
========================================= */

@media(max-width:480px){

    .main-content{
        padding:15px 10px;
    }

    .container{
        padding:20px 16px;

        border-radius:12px;
    }

    .container h2{
        font-size:22px;

        margin-bottom:22px;
    }

    label{
        font-size:14px;
    }

    input,
    select{
        padding:10px 12px;

        font-size:14px;
    }

    .button-group{
        flex-direction:column;
    }

    .update-btn,
    .back-btn{
        width:100%;

        text-align:center;

        padding:11px;

        font-size:14px;
    }
}

</style>
</head>
<body>
    <!-- HEADER -->
    <div th:replace="fragments :: header"></div>
	
    <!-- MAIN CONTENT -->
    <div class="main-content">
        <div class="container">

            <h2>Update User</h2>
			<!-- SUCCESS MESSAGE -->
			<div th:if="${success}"
			     class="success-msg">
			    <span th:text="${success}"></span>
			</div>
			
			<!-- ERROR MESSAGE -->
			<div th:if="${error}"
			     class="error-msg">
			    <span th:text="${error}"></span>
			</div>

            <form th:action="@{/user/updateSave}"
				  th:object="${user}"
                  method="post">

                <!-- Hidden ID -->
                <input type="hidden"
                       name="id"
                       th:value="${user.id}">

                <!-- First Name -->
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text"
                           name="firstName"
                           th:value="${user.firstName}">
                </div>
				
                <!-- Last Name -->
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text"
                           name="lastName"
                           th:value="${user.lastName}">
                </div>
                <!-- Email -->
                <div class="form-group">
                    <label>Email</label>
                    <input type="email"
                           name="workEmail"
                           th:value="${user.workEmail}">
                </div>

                <!-- Phone -->
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text"
                           name="phoneNo"
                           th:value="${user.phoneNo}">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label>Password</label>
                    <input type="text"
                           name="password"
                           th:value="${user.password}">
                </div>

                <!-- ROLE -->
                <div class="form-group">
                    <label>Select Role</label>
                    <select name="role.id">
                        <option value="">
                            -- Select Role --
                        </option>
                        <option th:each="r : ${roles}"
                                th:value="${r.id}"
                                th:text="${r.roleName}"
                                th:selected="${user.role != null and user.role.id == r.id}">
                        </option>
                    </select>
                </div>
		
				<!-- DEPARTMENT -->
				<div class="form-group">
				    <label>Select Department</label>
				    <select th:field="*{department.id}" required>
				        <option value="">
				            -- Select Department --
				        </option>
				        <option th:each="dept : ${departments}"
				                th:value="${dept.id}"
				                th:text="${dept.name}"
				                 th:selected="${user.department != null and user.department.id == dept.id}">>
				        </option>
				    </select>
				</div>
                <!-- BUTTONS -->
                <div class="button-group">
                    <button type="submit"class="update-btn"> Update User</button>
                    <a href="/user/user_panel"class="back-btn">Back </a>
                </div>
            </form>
        </div>
    </div>
    <!-- FOOTER -->
    <div th:replace="fragments :: footer"></div>

	<!-- JAVASCRIPT -->
	<script>
	function toggleMenu(){

	    document
	    .getElementById("mobileMenu")
	    .classList
	    .toggle("show");
	}
	</script>
</body>
</html>
