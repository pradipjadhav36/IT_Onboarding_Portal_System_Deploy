<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">
	  <link rel="stylesheet" th:href="@{/css/fragments.css}">
<title>Register</title>
<style>

/* ================= RESET ================= */

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */

body{
    font-family:'Segoe UI',sans-serif;
    background:linear-gradient(135deg,#eef2f7,#dbeafe);
	width:100%;
	overflow-x:hidden;
}





/* ================= TITLE ================= */

h1{

    text-align:center;

    margin-top:40px;

    color:#1e293b;

    font-size:42px;
}

/* ================= FORM ================= */

.form-container{

    width:90%;

    max-width:500px;

    margin:40px auto;

    background:white;

    padding:30px;

    border-radius:16px;

    box-shadow:0 10px 30px rgba(0,0,0,0.1);

    overflow:hidden;
}

/* LABEL */

label{

    display:block;

    margin-top:15px;

    font-weight:600;

    color:#374151;
}

/* INPUT */

input,
select{

    width:100%;

    padding:12px;

    margin-top:6px;

    border:1px solid #cbd5e1;

    border-radius:10px;

    font-size:15px;
}

/* BUTTON */

button{

    width:100%;

    margin-top:25px;

    padding:13px;

    border:none;

    border-radius:10px;

    background:linear-gradient(135deg,#2563eb,#3b82f6);

    color:white;

    font-size:16px;

    cursor:pointer;
}

/* LOGIN LINK */

.login-link{

    margin-top:15px;

    text-align:center;
}

.login-link a{

    text-decoration:none;

    color:#2563eb;
}

/* MOBILE */

@media(max-width:768px){

    h1{
        font-size:32px;
    }

    .form-container{
        padding:20px;
    }
}

</style>

</head>

<body>

<!-- HEADER -->

<div th:replace="~{fragments :: header}"></div>

<!-- TITLE -->

<h1>Register</h1>


<!-- FORM -->

<div class="form-container">
      
	<div th:if="${msg}"
	     style="
	        color:white;
	        background:red;
	        padding:10px;
	        margin-bottom:15px;
	        border-radius:5px;
	        text-align:center;
	     ">
		 
		 <div th:if="${success}"
		      style="
		         color:white;
		         background:green;
		         padding:10px;
		         margin-bottom:15px;
		         border-radius:5px;
		         text-align:center;
		      ">

		     <span th:text="${success}"></span>

		 </div>

	    <span th:text="${msg}"></span>

	</div>
	

	
<form th:action="@{/user/register}"
      th:object="${user}"
      method="post">
	  
	 

    <label>First Name</label>
    <input type="text"
           th:field="*{firstName}">
		   <span th:if="${#fields.hasErrors('firstName')}"
		         th:errors="*{firstName}"
		         style="color:red;">
		   </span>

    <label>Last Name</label>
    <input type="text"
           th:field="*{lastName}">
		   <span th:if="${#fields.hasErrors('lastName')}"
		   		         th:errors="*{lastName}"
		   		         style="color:red;">
		   		   </span>
		   

    <label>Email</label>
    <input type="email"
           th:field="*{workEmail}">
		   <span th:if="${#fields.hasErrors('workEmail')}"
		   		   		         th:errors="*{workEmail}"
		   		   		         style="color:red;">
		   		   		   </span>
		   

    <label>Password</label>
    <input type="password"
           th:field="*{password}">
		   <span th:if="${#fields.hasErrors('password')}"
		   		   		         th:errors="*{password}"
		   		   		         style="color:red;">
		   		   		   </span>

    <label>Phone</label>
    <input type="text"
           th:field="*{phoneNo}">
		   <span th:if="${#fields.hasErrors('phoneNo')}"
		   	   		   		         th:errors="*{phoneNo}"
		   	   		   		         style="color:red;">
		   	   		   		   </span>

    <label>Address</label>
    <input type="text"
           th:field="*{address}">
		   <span th:if="${#fields.hasErrors('address')}"
		   	   		   		         th:errors="*{address}"
		   	   		   		         style="color:red;">
		   </span>
		   
		   
		   
		   
	<label>Date Of Birth</label>
     <input type="date"
		        th:field="*{dateOfBirth}">
		        <span th:if="${#fields.hasErrors('dateOfBirth')}"
		                       th:errors="*{dateOfBirth}"
		                       style="color:red;">
		        </span>

							   
							   
		
    <label>Gender</label>
	

    <select th:field="*{gender}">

        <option value="">
            Select Gender
        </option>

        <option value="Male">
            Male
        </option>

        <option value="Female">
            Female
        </option>
		
		<span th:if="${#fields.hasErrors('gender')}"
			   		   		         th:errors="*{gender}"
			   		   		         style="color:red;">
			   		   		   </span>

    </select>

    <p class="login-link">

        Already registered ?

        <a href="/user/login">
            Login here
        </a>

    </p>

    <button type="submit">

        Register

    </button>

</form>

</div>

<!-- FOOTER -->

<div th:replace="~{fragments :: footer}"></div>

<!-- JAVASCRIPT -->

<script>

function toggleMenu(){

    document
    .getElementById("mobileMenu")
    .classList
    .toggle("show");
}

</script>

</body>
</html>
